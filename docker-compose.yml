services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: solvinghub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    command: 
      - "postgres"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Mount migrations so PostgreSQL auto-runs them on first start
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solvinghub} -d ${POSTGRES_DB:-solvinghub_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go API ───────────────────────────────────────────────────────────────
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: solvinghub_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: ${API_PORT:-8080}
      DB_DSN: postgres://${POSTGRES_USER:-solvinghub}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-solvinghub_db}?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8080/api/v1/auth/google/callback}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy  # wait for DB healthcheck to pass

  # ── Advanced DB Explorer (with ER Diagramming) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: solvinghub_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@solvinghub.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pg_data:
  pgadmin_data:
